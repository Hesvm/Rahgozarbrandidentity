<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 28px 32px; margin: 0; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .label { font-family: var(--font-en); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); }
  .field {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    font-family: var(--font-fa);
    font-size: 16px;
    color: var(--fg-1);
    box-sizing: border-box;
  }
  .field::placeholder { color: var(--fg-4); }
  .field.focus { border-color: var(--teal-500); box-shadow: var(--shadow-glow-brand); outline: none; }
  .field.error { border-color: var(--danger); }
  .err { font-family: var(--font-fa); font-size: 13px; color: var(--danger); margin-top: -8px; padding-inline-start: 4px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .search { display: flex; align-items: center; gap: 10px; padding: 12px 18px; background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: var(--radius-pill); }
  .search input { border: 0; outline: 0; background: transparent; flex: 1; font-family: var(--font-fa); font-size: 15px; color: var(--fg-1); }
  .search svg { color: var(--fg-4); }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="label" style="margin-bottom: 6px">Text field</div>
      <input class="field" placeholder="نام و نام خانوادگی" value="آرش">
    </div>
    <div class="row">
      <input class="field focus" style="flex:1" placeholder="ایمیل" value="arash@rahgozar.app">
      <input class="field error" style="flex:1" placeholder="رمز عبور" value="•••">
    </div>
    <div class="err">رمز عبور باید حداقل ۸ کاراکتر باشد.</div>
    <div>
      <div class="label" style="margin-bottom: 6px">Search (pill)</div>
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="جست‌وجوی کشور، ویزا، یا مقصد…">
      </div>
    </div>
  </div>
</body>
</html>
