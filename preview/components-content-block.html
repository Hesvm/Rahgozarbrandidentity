<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 28px 32px; margin: 0; }
  .label { font-family: var(--font-en); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); margin-bottom: 14px; }
  h3.section { font-size: 22px; font-weight: 700; color: var(--fg-1); margin: 0 0 14px; }
  .block {
    background: var(--fog-50);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 22px 26px;
    color: var(--fg-2);
    line-height: 2;
  }
  .block strong { color: var(--fg-1); }
</style>
</head>
<body>
  <div class="label">Wiki content block — country pages</div>
  <h3 class="section">جغرافیا و آب‌وهوا</h3>
  <div class="block">
    <strong>فنلاند</strong> هزاران دریاچه، جنگل شمالی، و شب‌های سفید تابستانی؛ زمستان طولانی و تاریک. آب‌وهوای ساحلی در جنوب معتدل‌تر است و در شمال قطبی، شب‌های قطبی و شفق شمالی.
  </div>
</body>
</html>
