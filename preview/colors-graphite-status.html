<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 24px; margin: 0; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .swatch { aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding: 10px; color: #FAF8F4; font-size: 11px; line-height:1.3; box-shadow: var(--shadow-inset-soft); }
  .swatch .h { font-weight: 600; }
  .swatch .v { opacity: 0.75; font-family: var(--font-mono); font-size: 10px; }
  .label { font-family: var(--font-en); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="label">Graphite — text</div>
  <div class="row" style="margin-bottom: 12px">
    <div class="swatch" style="background:var(--graphite-900)"><span class="h">900 · fg-1</span><span class="v">0F1A18</span></div>
    <div class="swatch" style="background:var(--graphite-800)"><span class="h">800</span><span class="v">1A2826</span></div>
    <div class="swatch" style="background:var(--graphite-700)"><span class="h">700 · fg-2</span><span class="v">2E3B38</span></div>
    <div class="swatch" style="background:var(--graphite-600)"><span class="h">600 · fg-3</span><span class="v">4A5754</span></div>
    <div class="swatch" style="background:var(--graphite-500)"><span class="h">500 · fg-4</span><span class="v">6B7672</span></div>
  </div>
  <div class="label">Semantic status — quiet, never neon</div>
  <div class="row">
    <div class="swatch" style="background:#2EA38C"><span class="h">success</span><span class="v">2EA38C</span></div>
    <div class="swatch" style="background:#C58A3A"><span class="h">warning</span><span class="v">C58A3A</span></div>
    <div class="swatch" style="background:#B85C5C"><span class="h">danger</span><span class="v">B85C5C</span></div>
    <div class="swatch" style="background:#4F84B8"><span class="h">info</span><span class="v">4F84B8</span></div>
    <div class="swatch" style="background:var(--teal-500); color:#FAF8F4"><span class="h">brand</span><span class="v">2EA38C</span></div>
  </div>
</body>
</html>
