<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 28px 32px; margin: 0; }
  .label { font-family: var(--font-en); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); margin-bottom: 14px; }
  .icons { display: grid; grid-template-columns: repeat(10, 1fr); gap: 18px; color: var(--fg-1); }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic span { font-family: var(--font-en); font-size: 9px; color: var(--fg-4); }
</style>
</head>
