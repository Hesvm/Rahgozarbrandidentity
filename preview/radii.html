<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 28px 32px; margin: 0; font-family: var(--font-en); }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); margin-bottom: 14px; }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shape { width: 80px; height: 80px; background: var(--bg-elevated); border: 1px solid var(--border-default); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); }
</style>
</head>
<body>
  <div class="label">Corner radii — never square</div>
  <div class="row">
    <div class="item"><div class="shape" style="border-radius: var(--radius-xs)"></div><span class="tok">xs</span><span class="val">6</span></div>
    <div class="item"><div class="shape" style="border-radius: var(--radius-sm)"></div><span class="tok">sm</span><span class="val">10</span></div>
    <div class="item"><div class="shape" style="border-radius: var(--radius-md)"></div><span class="tok">md</span><span class="val">14</span></div>
    <div class="item"><div class="shape" style="border-radius: var(--radius-lg)"></div><span class="tok">lg</span><span class="val">20</span></div>
    <div class="item"><div class="shape" style="border-radius: var(--radius-xl)"></div><span class="tok">xl</span><span class="val">28</span></div>
    <div class="item"><div class="shape" style="border-radius: var(--radius-2xl)"></div><span class="tok">2xl</span><span class="val">36</span></div>
    <div class="item"><div class="shape" style="width:120px; border-radius: var(--radius-pill)"></div><span class="tok">pill</span><span class="val">999</span></div>
  </div>
</body>
</html>
