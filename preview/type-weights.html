<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 24px 32px; margin: 0; }
  .label { font-family: var(--font-en); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 6px 0; vertical-align: baseline; }
  td.lbl { width: 70px; }
  td.sample { color: var(--fg-1); }
</style>
</head>
<body>
  <table>
    <tr><td class="lbl"><span class="label">200</span></td><td class="sample" style="font-weight:200; font-size: 22px">رهگذر — Rahgozar wayfarer</td></tr>
    <tr><td class="lbl"><span class="label">300</span></td><td class="sample" style="font-weight:300; font-size: 22px">رهگذر — Rahgozar wayfarer</td></tr>
    <tr><td class="lbl"><span class="label">400</span></td><td class="sample" style="font-weight:400; font-size: 22px">رهگذر — Rahgozar wayfarer</td></tr>
    <tr><td class="lbl"><span class="label">500</span></td><td class="sample" style="font-weight:500; font-size: 22px">رهگذر — Rahgozar wayfarer</td></tr>
    <tr><td class="lbl"><span class="label">600</span></td><td class="sample" style="font-weight:600; font-size: 22px">رهگذر — Rahgozar wayfarer</td></tr>
    <tr><td class="lbl"><span class="label">700</span></td><td class="sample" style="font-weight:700; font-size: 22px">رهگذر — Rahgozar wayfarer</td></tr>
    <tr><td class="lbl"><span class="label">800</span></td><td class="sample" style="font-weight:800; font-size: 22px">رهگذر — Rahgozar wayfarer</td></tr>
  </table>
</body>
</html>
