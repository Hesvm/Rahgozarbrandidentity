<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 24px; margin: 0; }
  .row { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
  .swatch { aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding: 10px; color: var(--graphite-900); font-size: 11px; line-height:1.3; box-shadow: var(--shadow-inset-soft); }
  .swatch .h { font-weight: 600; }
  .swatch .v { opacity: 0.7; font-family: var(--font-mono); font-size: 10px; }
  .swatch.dark { color: #FAF8F4; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch" style="background:var(--teal-50)"><span class="h">50</span><span class="v">#ECF7F4</span></div>
    <div class="swatch" style="background:var(--teal-100)"><span class="h">100</span><span class="v">#D4EFE8</span></div>
    <div class="swatch" style="background:var(--teal-200)"><span class="h">200</span><span class="v">#A9DFD2</span></div>
    <div class="swatch" style="background:var(--teal-300)"><span class="h">300</span><span class="v">#74CCBC</span></div>
    <div class="swatch dark" style="background:var(--teal-400)"><span class="h">400</span><span class="v">#4FB8A4</span></div>
    <div class="swatch dark" style="background:var(--teal-500)"><span class="h">500 · brand</span><span class="v">#2EA38C</span></div>
    <div class="swatch dark" style="background:var(--teal-600)"><span class="h">600</span><span class="v">#178672</span></div>
    <div class="swatch dark" style="background:var(--teal-700)"><span class="h">700</span><span class="v">#0F6A5B</span></div>
    <div class="swatch dark" style="background:var(--teal-900)"><span class="h">900</span><span class="v">#0A332E</span></div>
  </div>
</body>
</html>
