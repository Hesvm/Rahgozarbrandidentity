<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 36px 32px; margin: 0; font-family: var(--font-en); }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); margin-bottom: 22px; }
  .row { display: flex; gap: 28px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .card { width: 92px; height: 60px; background: #FFFFFF; border-radius: var(--radius-md); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="label">Elevation — soft, mostly-vertical, low spread</div>
  <div class="row">
    <div class="item"><div class="card" style="box-shadow: var(--shadow-1)"></div><span class="tok">shadow-1</span></div>
    <div class="item"><div class="card" style="box-shadow: var(--shadow-2)"></div><span class="tok">shadow-2</span></div>
    <div class="item"><div class="card" style="box-shadow: var(--shadow-3)"></div><span class="tok">shadow-3</span></div>
    <div class="item"><div class="card" style="box-shadow: var(--shadow-4)"></div><span class="tok">shadow-4</span></div>
    <div class="item"><div class="card" style="box-shadow: var(--shadow-inset-soft); background:var(--fog-50)"></div><span class="tok">inset-soft</span></div>
    <div class="item"><div class="card" style="box-shadow: var(--shadow-glow-brand); background: var(--teal-50)"></div><span class="tok">glow-brand</span></div>
  </div>
</body>
</html>
