<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 28px 32px; margin: 0; font-family: var(--font-en); }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); margin-bottom: 6px; }
  .grid { display: grid; grid-template-columns: 100px 1fr; gap: 4px 16px; align-items: center; }
  .bar { background: var(--teal-500); height: 14px; border-radius: 3px; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
</style>
</head>
<body>
  <div class="label">Spacing scale · 4-px grid</div>
  <div class="grid">
    <div><span class="tok">space-1</span> <span class="val">· 4</span></div>
    <div><div class="bar" style="width:4px"></div></div>
    <div><span class="tok">space-2</span> <span class="val">· 8</span></div>
    <div><div class="bar" style="width:8px"></div></div>
    <div><span class="tok">space-3</span> <span class="val">· 12</span></div>
    <div><div class="bar" style="width:12px"></div></div>
    <div><span class="tok">space-4</span> <span class="val">· 16</span></div>
    <div><div class="bar" style="width:16px"></div></div>
    <div><span class="tok">space-5</span> <span class="val">· 24</span></div>
    <div><div class="bar" style="width:24px"></div></div>
    <div><span class="tok">space-6</span> <span class="val">· 32</span></div>
    <div><div class="bar" style="width:32px"></div></div>
    <div><span class="tok">space-7</span> <span class="val">· 48</span></div>
    <div><div class="bar" style="width:48px"></div></div>
    <div><span class="tok">space-8</span> <span class="val">· 64</span></div>
    <div><div class="bar" style="width:64px"></div></div>
    <div><span class="tok">space-9</span> <span class="val">· 96</span></div>
    <div><div class="bar" style="width:96px"></div></div>
    <div><span class="tok">space-10</span> <span class="val">· 128</span></div>
    <div><div class="bar" style="width:128px"></div></div>
  </div>
</body>
</html>
