<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 0; margin: 0; }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    background: rgba(250, 248, 244, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-soft);
  }
  .right { display: flex; align-items: center; gap: 8px; }
  .links { display: flex; gap: 28px; }
  .link { font-family: var(--font-fa); font-size: 15px; color: var(--fg-2); text-decoration: none; }
  .link.active { color: var(--fg-1); font-weight: 600; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand img { width: 32px; height: 32px; }
  .brand span { font-family: var(--font-fa); font-size: 20px; font-weight: 700; color: var(--fg-1); }
  .iconbtn { width: 38px; height: 38px; display: grid; place-items: center; border-radius: var(--radius-pill); background: transparent; border: 0; color: var(--fg-2); cursor: pointer; }
  .iconbtn:hover { background: var(--bg-muted); }
  .signin {
    font-family: var(--font-fa); font-size: 15px;
    background: var(--teal-400); color: #FFFFFF;
    padding: 10px 18px; border-radius: var(--radius-md); border: 0;
    line-height: 1;
  }
  .below {
    padding: 30px 28px; color: var(--fg-3);
    font-family: var(--font-en); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
  }
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">
      <img src="../assets/logo-mark.png" width="32" height="32" alt="">
      <span>رهگذر</span>
    </div>
    <div class="links">
      <a class="link" href="#">ویکی‌کشور</a>
      <a class="link" href="#">نقشه‌راه</a>
      <a class="link" href="#">کامیونیتی‌ها</a>
      <a class="link" href="#">آزمون</a>
    </div>
    <div class="right">
      <button class="iconbtn" aria-label="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
      <button class="signin">ورود</button>
    </div>
  </div>
  <div class="below">top nav — sticky, 12-px backdrop blur over warm stone</div>
</body>
</html>
