<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-canvas); padding: 24px 28px; margin: 0; font-family: var(--font-en); }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-4); margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: 100px 1fr 90px; gap: 10px 14px; align-items: center; font-size: 12px; }
  .name { font-family: var(--font-mono); color: var(--fg-2); }
  .bar { height: 8px; background: var(--graphite-700); border-radius: 2px; }
  .val { font-family: var(--font-mono); color: var(--fg-4); font-size: 11px; }
  .ease { height: 36px; position: relative; background: var(--fog-50); border-radius: var(--radius-sm); overflow: hidden; }
  .dot { position: absolute; left: 0; top: 50%; width: 14px; height: 14px; background: var(--teal-500); border-radius: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>
  <div class="label">Motion — drifting, never springy</div>
  <div class="grid">
    <div class="name">dur-fast</div><div class="bar" style="width: 30%"></div><div class="val">160 ms</div>
    <div class="name">dur-base</div><div class="bar" style="width: 48%"></div><div class="val">240 ms</div>
    <div class="name">dur-slow</div><div class="bar" style="width: 78%"></div><div class="val">420 ms</div>
    <div class="name">dur-drift</div><div class="bar" style="width: 100%"></div><div class="val">720 ms</div>
  </div>
  <div style="height: 16px"></div>
  <div class="grid">
    <div class="name">ease-drift</div>
    <div class="ease">
      <svg width="100%" height="100%" viewBox="0 0 100 36" preserveAspectRatio="none">
        <path d="M 0 30 C 22 30 36 7 100 6" stroke="#178672" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <div class="val">.22 .61 .36 1</div>
    <div class="name">ease-rise</div>
    <div class="ease">
      <svg width="100%" height="100%" viewBox="0 0 100 36" preserveAspectRatio="none">
        <path d="M 0 30 C 16 6 16 6 100 6" stroke="#178672" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <div class="val">.16 1 .3 1</div>
  </div>
</body>
</html>
